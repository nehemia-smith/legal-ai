<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legatia — Konsultasi Hukum</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --navy: #0f1f3d;
            --navy-light: #1a3460;
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --cream: #f8f5ef;
            --white: #ffffff;
            --gray: #6b7280;
            --border: #e5e0d5;
        }
        body { font-family: 'Inter', sans-serif; background: var(--cream); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* NAVBAR */
        .navbar {
            background: var(--navy);
            padding: 0 40px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(201,168,76,0.3);
            flex-shrink: 0;
        }
        .logo-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            font-weight: 600;
            font-style: italic;
            color: var(--gold);
            letter-spacing: 1px;
            text-decoration: none;
        }
        .nav-links { display: flex; align-items: center; gap: 8px; }
        .nav-btn {
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            text-decoration: none;
        }
        .nav-btn.outline { background: transparent; border: 1px solid rgba(201,168,76,0.5); color: var(--gold); }
        .nav-btn.primary { background: var(--gold); border: 1px solid var(--gold); color: var(--navy); font-weight: 600; }

        /* MAIN */
        .main { display: flex; flex: 1; overflow: hidden; }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            background: var(--navy);
            border-right: 1px solid rgba(201,168,76,0.15);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            padding: 24px 16px;
        }
        .sidebar-label { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; color: rgba(255,255,255,0.35); text-transform: uppercase; margin-bottom: 12px; }
        .new-chat-btn {
            width: 100%;
            padding: 11px 16px;
            background: rgba(201,168,76,0.12);
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 8px;
            color: var(--gold);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }
        .new-chat-btn:hover { background: rgba(201,168,76,0.22); }

        /* CHAT */
        .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 32px 40px; }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* WELCOME */
        .welcome { text-align: center; padding: 60px 20px; }
        .welcome-icon { font-size: 48px; margin-bottom: 20px; }
        .welcome h2 { font-family: 'Cormorant Garamond', serif; font-size: 32px; color: var(--navy); margin-bottom: 10px; }
        .welcome p { color: var(--gray); font-size: 15px; max-width: 480px; margin: 0 auto 32px; line-height: 1.6; }

        .suggestion-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 560px; margin: 0 auto; }
        .suggestion {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .suggestion:hover { border-color: var(--gold); box-shadow: 0 2px 12px rgba(201,168,76,0.15); }
        .suggestion-icon { font-size: 20px; margin-bottom: 6px; }
        .suggestion-text { font-size: 13px; color: var(--navy); font-weight: 500; line-height: 1.4; }

        /* MESSAGES */
        .message { display: flex; gap: 12px; margin-bottom: 24px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { flex-direction: row-reverse; }
        .msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .message.ai .msg-avatar { background: linear-gradient(135deg, var(--navy), var(--navy-light)); border: 1px solid rgba(201,168,76,0.3); }
        .message.user .msg-avatar { background: var(--gold); color: var(--navy); font-weight: 700; font-size: 12px; }
        .msg-content { max-width: 70%; }
        .msg-bubble { padding: 14px 18px; border-radius: 12px; font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
        .message.ai .msg-bubble { background: var(--white); color: #1f2937; border: 1px solid var(--border); border-top-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        .message.user .msg-bubble { background: var(--navy); color: var(--white); border-top-right-radius: 4px; }
        .msg-time { font-size: 11px; color: var(--gray); margin-top: 4px; padding: 0 4px; }
        .message.user .msg-time { text-align: right; }

        .loading-dots span { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--gold); margin: 0 2px; animation: bounce 1.2s infinite; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

        /* INPUT */
        .input-area { padding: 16px 40px 20px; background: var(--cream); border-top: 1px solid var(--border); flex-shrink: 0; }
        .input-wrap {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            align-items: flex-end;
            padding: 12px 16px;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: border-color 0.2s;
        }
        .input-wrap:focus-within { border-color: var(--gold); box-shadow: 0 2px 12px rgba(201,168,76,0.15); }
        textarea { flex: 1; border: none; outline: none; resize: none; font-size: 14px; font-family: 'Inter', sans-serif; color: #1f2937; background: transparent; min-height: 24px; max-height: 120px; line-height: 1.5; }
        textarea::placeholder { color: #9ca3af; }
        .send-btn { width: 36px; height: 36px; background: var(--navy); border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
        .send-btn:hover { background: var(--navy-light); }
        .send-btn:disabled { background: #d1d5db; cursor: not-allowed; }
        .send-btn svg { width: 16px; height: 16px; fill: white; }
        .disclaimer { text-align: center; font-size: 11px; color: #9ca3af; margin-top: 8px; }
    </style>
</head>
<body>

<div class="navbar">
    <a href="/" class="logo-text">Legatia</a>
    <div class="nav-links">
        <a href="/" class="nav-btn outline">Beranda</a>
    </div>
</div>

<div class="main">
    <div class="sidebar">
        <div class="sidebar-label">Percakapan</div>
        <button class="new-chat-btn" onclick="location.reload()">
            <span>+</span> Konsultasi Baru
        </button>
    </div>

    <div class="chat-area">
        <div class="chat-messages" id="chat">
            <div class="welcome" id="welcome">
                <div class="welcome-icon">⚖️</div>
                <h2>Selamat datang di Legatia</h2>
                <p>Tanyakan pertanyaan hukum Anda. Kami akan menjawab berdasarkan peraturan perundang-undangan Indonesia yang berlaku.</p>
                <div class="suggestion-grid">
                    <button class="suggestion" onclick="useSuggestion(this)">
                        <div class="suggestion-icon">👷</div>
                        <div class="suggestion-text">Apa hak saya jika di-PHK tanpa pesangon?</div>
                    </button>
                    <button class="suggestion" onclick="useSuggestion(this)">
                        <div class="suggestion-icon">📋</div>
                        <div class="suggestion-text">Berapa lama maksimal kontrak kerja PKWT?</div>
                    </button>
                    <button class="suggestion" onclick="useSuggestion(this)">
                        <div class="suggestion-icon">🏠</div>
                        <div class="suggestion-text">Bagaimana prosedur hukum sengketa tanah?</div>
                    </button>
                    <button class="suggestion" onclick="useSuggestion(this)">
                        <div class="suggestion-icon">💼</div>
                        <div class="suggestion-text">Apa syarat mendirikan PT di Indonesia?</div>
                    </button>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrap">
                <textarea id="input" placeholder="Tanyakan pertanyaan hukum Anda..." rows="1"
                    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
                <button class="send-btn" id="btn" onclick="kirim()">
                    <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
                </button>
            </div>
            <p class="disclaimer">⚠️ Legatia bukan pengganti nasihat hukum resmi. Untuk kasus spesifik, konsultasikan dengan lawyer.</p>
        </div>
    </div>
</div>

<script>
    function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
    function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); kirim(); } }
    function useSuggestion(el) { document.getElementById('input').value = el.querySelector('.suggestion-text').textContent; kirim(); }
    function getTime() { return new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }); }

    async function kirim() {
        const input = document.getElementById('input');
        const btn = document.getElementById('btn');
        const chat = document.getElementById('chat');
        const pertanyaan = input.value.trim();
        if (!pertanyaan) return;

        const welcome = document.getElementById('welcome');
        if (welcome) welcome.remove();

        chat.innerHTML += `
        <div class="message user">
            <div class="msg-avatar">A</div>
            <div class="msg-content">
                <div class="msg-bubble">${pertanyaan}</div>
                <div class="msg-time">${getTime()}</div>
            </div>
        </div>`;

        input.value = '';
        input.style.height = 'auto';
        btn.disabled = true;
        chat.scrollTop = chat.scrollHeight;

        const loadId = 'load-' + Date.now();
        chat.innerHTML += `
        <div class="message ai" id="${loadId}">
            <div class="msg-avatar">⚖️</div>
            <div class="msg-content">
                <div class="msg-bubble">
                    <div class="loading-dots"><span></span><span></span><span></span></div>
                </div>
            </div>
        </div>`;
        chat.scrollTop = chat.scrollHeight;

        try {
            const res = await fetch('/tanya', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pertanyaan })
            });
            const data = await res.json();
            document.getElementById(loadId).remove();
            chat.innerHTML += `
            <div class="message ai">
                <div class="msg-avatar">⚖️</div>
                <div class="msg-content">
                    <div class="msg-bubble">${data.jawaban}</div>
                    <div class="msg-time">${getTime()}</div>
                </div>
            </div>`;
        } catch (err) {
            document.getElementById(loadId).remove();
            chat.innerHTML += `
            <div class="message ai">
                <div class="msg-avatar">⚖️</div>
                <div class="msg-content">
                    <div class="msg-bubble">Maaf, terjadi kesalahan. Silakan coba lagi.</div>
                </div>
            </div>`;
        }

        btn.disabled = false;
        chat.scrollTop = chat.scrollHeight;
    }
</script>
</body>
</html>
